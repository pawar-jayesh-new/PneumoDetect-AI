<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PneumoDetect Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
      {% for message in messages %}
        <div class="flash-message">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}


<!-- Back Button -->
<a href="{{ url_for('home') }}" class="back-btn">← Back</a>

<div class="login-container">

    <div class="login-card">

        <h3 class="brand">PneumoDetect</h3>

        <div class="icon"></div>

        <h2>Login</h2>
        <p class="subtitle">Access your account</p>

        <form method="POST" action="{{ url_for('login') }}">

            <div class="input-box">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" class="no-underline">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <p class="register-text">
                Don’t have an account?
                <a href="{{ url_for('register') }}" class="no-underline">
                    Register
                </a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
