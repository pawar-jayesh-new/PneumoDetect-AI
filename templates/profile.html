<!DOCTYPE html>
<html>
<head>
    <title>Profile - PneumoDetect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='doctor_dashboard.css') }}">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="logo">PneumoDetect</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('doctor_dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('upload_page') }}">Upload X-ray</a></li>
            <li><a href="{{ url_for('reports_page') }}">Reports</a></li>
            <li class="active"><a href="{{ url_for('profile_page') }}">Profile</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">

    <h1>Profile Settings</h1>

    <!-- TOP ROW -->
    <div class="profile-row">

        <!-- BASIC INFO -->
        <div class="profile-card">
            <h2>Basic Information</h2>
            <form method="POST">
                <input type="hidden" name="update_basic">

                <label>Full Name</label>
                <input type="text" name="fullname" value="{{ user[0] }}" required>

                <label>Specialization</label>
                <input type="text" name="specialization" value="{{ user[3] }}">

                <label>Hospital</label>
                <input type="text" name="hospital" value="{{ user[4] }}">

                <button type="submit" class="update-btn">Save Changes</button>
            </form>
        </div>

        <!-- SECURITY -->
        <div class="profile-card">
            <h2>Security Settings</h2>
            <form method="POST">
                <input type="hidden" name="update_security">

                <label>Email</label>
                <input type="email" name="email" value="{{ user[1] }}" required>

                <label>Contact</label>
                <input type="text" name="contact" value="{{ user[2] }}">

                <label>New Password</label>
                <input type="password" name="new_password"
                       placeholder="Leave blank to keep current password">

                <button type="submit" class="update-btn">Update Security</button>
            </form>
        </div>

    </div>

    <!-- DELETE ACCOUNT CENTER -->
    <div class="profile-row center-row">
        <div class="profile-card danger-card center-card">
            <h2>Delete Account</h2>
            <p>This action cannot be undone.</p>

            <form method="POST"
                  onsubmit="return confirm('Are you sure you want to delete your account?');">
                <input type="hidden" name="delete_account">
                <button type="submit" class="delete-btn">Delete Account</button>
            </form>
        </div>
    </div>

</main>


</div>

</body>
</html>
